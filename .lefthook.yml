pre-commit:
  jobs:
    - name: dotnet Format
      glob: "*.{cs,csproj}"
      run: dotnet format pwsh-virt.sln --verify-no-changes

    - name: dotnet Test
      glob: "*.{cs,csproj}"
      run: dotnet test pwsh-virt.sln

    - name: Actions Lint
      glob: ".github/workflows/*.yml"
      run: actionlint
